<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>enalcee + Крестики-нолики</title>
<script src="https://kit.fontawesome.com/b617dc6679.js" crossorigin="anonymous"></script>
<style>
/* --- Основные стили --- */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: 'Arial Black', sans-serif;
  overflow: hidden;
  user-select: none;
  color: white;
}

/* --- Загрузка --- */
#loader {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
#loader span {
  font-size: 32px;
  color: white;
  text-shadow: 0 0 10px white, 0 0 30px #ccc;
  animation: flicker 1.2s infinite alternate;
}
@keyframes flicker {
  0% { opacity: 0.8; text-shadow: 0 0 6px white; }
  100% { opacity: 1; text-shadow: 0 0 14px white, 0 0 26px #ccc; }
}

/* --- Стартовый экран --- */
#start-screen {
  opacity: 0.6;
  display: none;
  justify-content: center;
  align-items: center;
  height: 100%;
  background: url('Picsart_25-07-06_12-49-05-878.jpg') center center no-repeat;
  background-size: 300%;
  animation: moveBG 40s ease-in-out infinite alternate;
  flex-direction: column;
  cursor: default;
}
@keyframes moveBG {
  0% { background-position: center center; }
  100% { background-position: 52% 48%; }
}
#start-screen h1 {
  font-size: 64px;
  color: white;
  text-shadow: 0 0 10px white, 0 0 30px #ccc;
  animation: flicker 1.5s infinite alternate;
}

/* --- Видео и блок --- */
#video-section {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  height: 100%;
  position: relative;
}
video#mainVideo {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
  background: black;
}

/* --- Эффект сломанного ТВ --- */
#glitch {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 1;
  background: rgba(255,255,255,0.03);
  animation: glitchEffect 0.1s infinite;
}
@keyframes glitchEffect {
  0%   { opacity: 0.02; transform: translate(0,0); }
  10%  { opacity: 0.05; transform: translate(-2px,1px); }
  20%  { opacity: 0.03; transform: translate(1px,-1px); }
  30%  { opacity: 0.06; transform: translate(-1px,2px); }
  40%  { opacity: 0.04; transform: translate(2px,-2px); }
  50%  { opacity: 0.05; transform: translate(0,1px); }
  60%  { opacity: 0.03; transform: translate(-2px,0); }
  70%  { opacity: 0.06; transform: translate(1px,1px); }
  80%  { opacity: 0.04; transform: translate(-1px,-1px); }
  90%  { opacity: 0.05; transform: translate(2px,0); }
  100% { opacity: 0.03; transform: translate(0,0); }
}

/* --- Аватар --- */
#avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 0 12px white;
  position: relative;
  z-index: 2;
  animation: swing 4s ease-in-out infinite alternate;
}
#avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
@keyframes swing {
  0%   { transform: rotate(-5deg); }
  50%  { transform: rotate(5deg); }
  100% { transform: rotate(-5deg); }
}

/* --- Ник --- */
#username {
  font-size: 36px;
  color: #B497FF;
  text-shadow: 0 0 10px #B497FF, 0 0 20px #B497FF;
  animation: float 3s ease-in-out infinite alternate;
  margin-bottom: 16px;
  font-weight: bold;
  will-change: transform;
  z-index: 2;
}
@keyframes float {
  0%   { transform: translateY(0); }
  100% { transform: translateY(10px); }
}

/* --- Соцсети --- */
.social-box {
  margin-top: 40px;
  margin-bottom: 30px;
  padding: 10px 25px;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  box-shadow: 0 0 6px white, 0 0 12px #ccc;
  z-index: 2;
}
.social-box a {
  font-size: 18px;
  color: #B497FF;
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  transition: background 0.3s ease;
  display: flex;
  align-items: center;
}
.social-box a i {
  margin-right: 8px;
}
.social-box a:hover {
  background: rgba(255,255,255,0.1);
}

/* --- Кнопка паузы --- */
#pause-button {
  font-size: 38px;
  color: black;
  cursor: pointer;
  margin-bottom: 24px;
  z-index: 2;
  user-select: none;
  text-align: center;
}
#pause-button:focus { outline: none; }

/* --- Футер --- */
footer {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: black;
  font-weight: bold;
  z-index: 2;
}
footer a { color: #B497FF; text-decoration:none; }

/* --- Крестики-нолики --- */
#tic-container {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-top: 20px;
}
#game {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  grid-template-rows: repeat(3, 80px);
  gap: 5px;
}
.cell {
  width: 80px; height: 80px;
  background: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 48px;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.2s;
}
.cell:hover { background: #333; }
#message { margin-top: 20px; font-size:20px; color:#B497FF; text-align:center;}
#restart {
  margin-top: 10px; padding: 8px 16px;
  font-size: 18px; border: none;
  border-radius: 8px; cursor:pointer;
  background:#B497FF; color:black; font-weight:bold;
}
#restart:hover { background:#9a7bdc; }
</style>
</head>
<body>
<div id="loader"><span id="loading-text">Загрузка</span></div>

<div id="start-screen">
  <h1 onclick="startSite()">ТЫК</h1>
</div>

<div id="video-section">
  <video autoplay playsinline id="mainVideo">
    <source src="lv_0_20250706151148.mp4" type="video/mp4">
  </video>
  <div id="glitch"></div>
  <div id="avatar">
    <img src="Picsart_25-07-06_12-49-19-291.png" alt="avatar">
  </div>
  <div id="username">𓆩enaclee𓆪</div>

  <div class="social-box">
    <a href="https://www.faceit.com/en/players/enaclee" target="_blank">⊹ FACEIT</a>
    <a href="https://discord.com/users/enaclee" target="_blank"><i class="fab fa-discord"></i> Discord</a>
    <a href="https://steamcommunity.com/id/enalcee" target="_blank"><i class="fab fa-steam"></i> Steam</a>
    <a href="https://vk.com/sergeileonov" target="_blank"><i class="fab fa-vk"></i> VK</a>
    <a href="https://t.me/enaclee" target="_blank"><i class="fab fa-telegram"></i> Telegram</a>
    <a href="https://twitch.tv/enaclee" target="_blank"><i class="fab fa-twitch"></i> Twitch</a>
  </div>

  <div id="pause-button" onclick="togglePlayback()">×</div>
  <footer>© 2023 - 2028 Все права защищены — Контент защищён авторским правом.<br>Создатель 🖤 <a href="https://vk.com/sergeileonov" target="_blank">@sergeileonov</a></footer>

  <!-- Игровая зона -->
  <div id="tic-container">
    <div id="game"></div>
    <div>
      <div id="message"></div>
      <button id="restart" style="display:none;">Начать сначала</button>
    </div>
  </div>
</div>

<script>
// --- Загрузка ---
let dots = 0;
const loadingText = document.getElementById('loading-text');
const interval = setInterval(() => {
  dots = (dots+1)%4;
  loadingText.textContent = 'Загрузка'+'.'.repeat(dots);
},500);
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById('loader').remove();
    document.getElementById('start-screen').style.display='flex';
  },3000);
});

// --- Видео ---
let isPlaying = false;
function startSite() {
  const startScreen = document.getElementById('start-screen');
  const videoSection = document.getElementById('video-section');
  const video = document.getElementById('mainVideo');
  if(isPlaying){video.pause(); videoSection.style.display="none"; startScreen.style.display="flex"; isPlaying=false;}
  else {startScreen.style.display="none"; videoSection.style.display="flex"; video.play().catch(()=>{}); isPlaying=true;}
}
function togglePlayback() {
  const video = document.getElementById('mainVideo');
  const pauseBtn = document.getElementById('pause-button');
  if(video.paused){video.play(); pauseBtn.textContent='×';}
  else {video.pause(); pauseBtn.textContent='>';}
}

// --- Крестики-нолики ---
const gameContainer = document.getElementById('game');
const message = document.getElementById('message');
const restartBtn = document.getElementById('restart');
let board = Array(9).fill(''), gameOver=false;

// Создание ячеек
for(let i=0;i<9;i++){
  const cell=document.createElement('div');
  cell.classList.add('cell');
  cell.dataset.index=i;
  cell.addEventListener('click', playerMove);
  gameContainer.appendChild(cell);
}

function playerMove(e){
  const idx=e.target.dataset.index;
  if(board[idx]==='' && !gameOver){
    board[idx]='X';
    e.target.textContent='X';
    if(checkWinner('X')) return endGame("Поздравляю держи медальку 🏅");
    if(board.every(c=>c!=='')) return endGame("Ничья!");
    setTimeout(computerMove,300);
  }
}
function computerMove(){
  let emptyIndices = board.map((v,i)=>v===''?i:null).filter(v=>v!==null);
  if(emptyIndices.length===0) return;
  const move=emptyIndices[Math.floor(Math.random()*emptyIndices.length)];
  board[move]='O';
  document.querySelector(`.cell[data-index='${move}']`).textContent='O';
  if(checkWinner('O')) return endGame("Компьютер победил!");
  if(board.every(c=>c!=='')) return endGame("Ничья!");
}
function checkWinner(player){
  const winCombos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return winCombos.some(combo=>combo.every(i=>board[i]===player));
}
function endGame(msg){
  gameOver=true;
  message.textContent=msg;
  restartBtn.style.display='inline-block';
}
restartBtn.addEventListener('click', ()=>{
  board.fill('');
  document.querySelectorAll('.cell').forEach(c=>c.textContent='');
  gameOver=false;
  message.textContent='';
  restartBtn.style.display='none';
});
</script>
</body>
</html>
